[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.backends._legacy:_Backend"

[project]
name = "claude-code-wrapper"
version = "0.2.0"
description = "Clipboard-bridge that turns your Claude Pro web account into a local API with file-system and shell tools."
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "flask>=3.0",
    "pyperclip>=1.8",
]

[project.scripts]
claude-code = "claude_code.cli:main"
