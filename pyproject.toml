[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.backends._legacy:_Backend"

[project]
name = "claude-code-wrapper"
version = "0.1.0"
description = "Python API wrapper that gives Claude agentic file-system and shell tools via the Messages API."
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "anthropic>=0.39.0",
]

[project.scripts]
claude-code = "claude_code.cli:main"
